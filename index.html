<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="rain-canvas"></canvas>
    <nav> 
        
    </nav>

    <section id="hero">
        <div class="hero-content">
            <img src="photo/profile.jpg" alt="Profile photo" class="profile-pic">
            <h1>Hi, I'm <span class="highlight">AetJayy</span></h1>
            <p class="subtitle">444.</p>
            <p class="description">Rose🌹</p>
            <div class="personal-details">
                <span><i class="fas fa-map-marker-alt"></i> Phnom Penh, Cambodia</span>
                <span><i class="fas fa-graduation-cap"></i> SETEC Institute</span>
            </div>
            <div class="social-links">
                <a href="https://www.facebook.com/vareakvuth" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://t.me/Im_Hanxin" target="_blank" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="https://www.tiktok.com/@ohhmygoddbroo" target="_blank" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="robot" id="robot">
                <div class="speech-bubble" id="speech">Hello!</div>
                <div class="robot-body">
                    <div class="robot-head">
                        <div class="antenna"></div>
                        <div class="antenna-ball"></div>
                        <div class="ear left-ear"></div>
                        <div class="ear right-ear"></div>
                        <div class="visor"></div>
                        <div class="eye left-eye"></div>
                        <div class="eye right-eye"></div>
                        <div class="mouth"></div>
                        <div class="neck"></div>
                    </div>
                    <div class="robot-torso">
                        <div class="shoulder left-shoulder"></div>
                        <div class="shoulder right-shoulder"></div>
                        <div class="arm left-arm">
                            <div class="upper-arm"></div>
                            <div class="elbow"></div>
                            <div class="forearm"></div>
                            <div class="hand"></div>
                        </div>
                        <div class="arm right-arm">
                            <div class="upper-arm"></div>
                            <div class="elbow"></div>
                            <div class="forearm"></div>
                            <div class="hand"></div>
                        </div>
                        <div class="chest-plate">
                            <div class="chest-light"></div>
                            <div class="chest-light"></div>
                            <div class="chest-light"></div>
                        </div>
                        <div class="waist"></div>
                    </div>
                    <div class="robot-legs">
                        <div class="leg left-leg">
                            <div class="thigh"></div>
                            <div class="knee"></div>
                            <div class="shin"></div>
                            <div class="foot"></div>
                        </div>
                        <div class="leg right-leg">
                            <div class="thigh"></div>
                            <div class="knee"></div>
                            <div class="shin"></div>
                            <div class="foot"></div>
                        </div>
                    </div>
                </div>
            </div>

    <button id="music-toggle" class="music-btn">🔇</button>

    <audio id="bg-music" loop>
        <source src="audio/music.mp3" type="audio/mpeg">
    </audio>

    <footer>
        <p>&copy; 2026 AetJayy. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
